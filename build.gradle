plugins {
    id 'fabric-loom' version '1.15.5'
    id 'maven-publish'
}

// --- Multi-version dev profile selector (-Pmc=1.20.1 | 1.20.4) ---
// Picks Minecraft / yarn / Fabric API / BBS jar / Iris / Sodium coordinates for
// the target version. The PRODUCT jar is built against 1.20.1 (lower version =
// most stable intermediary names "upward"); 1.20.4 is used to dev-test the
// 1.20.4 path. The compiled jar is universal across the depends range either way.
def mcTarget = (project.findProperty('mc') ?: '1.20.1').toString()
def mcVersions = [
    '1.20.1': [
        minecraft: '1.20.1',
        yarn     : '1.20.1+build.10',
        fabricApi: '0.92.9+1.20.1',
        bbsJar   : 'libs/bbs-2.2.1-1.20.1.jar',
        sodium   : 'mc1.20.1-0.5.11',
        iris     : '1.7.2+1.20.1',
        lwjglPin : '3.3.1',
    ],
    '1.20.4': [
        minecraft: '1.20.4',
        yarn     : '1.20.4+build.1',
        fabricApi: '0.91.1+1.20.4',
        bbsJar   : 'libs/bbs-2.2.1-1.20.4.jar',
        sodium   : 'mc1.20.4-0.5.8',
        iris     : '1.7.2+1.20.4',
        lwjglPin : null,
    ],
]
if (!mcVersions.containsKey(mcTarget)) {
    throw new GradleException("Unknown -Pmc=${mcTarget}; expected 1.20.1 or 1.20.4")
}
def V = mcVersions[mcTarget]
logger.lifecycle("IRLite build target: Minecraft ${V.minecraft} (yarn ${V.yarn})")

version = project.mod_version
group = project.maven_group

base {
    archivesName = project.archives_base_name
}

loom {
    splitEnvironmentSourceSets()

    mods {
        "irlite" {
            sourceSet sourceSets.main
            sourceSet sourceSets.client
        }
    }
}

fabricApi {
    configureDataGeneration {
        client = true
    }
}

repositories {
    exclusiveContent {
        forRepository {
            maven {
                name = "Modrinth"
                url = "https://api.modrinth.com/maven"
            }
        }
        filter {
            includeGroup "maven.modrinth"
        }
    }
    // glsl-transformer (io.github.douira), an Iris runtime dependency.
    maven { url = "https://maven.gegy.dev/" }
    // irl-core (shared engine) is published here by `gradlew publishToMavenLocal`
    // in ../irl-core — must be resolvable before this mod builds.
    mavenLocal()
    mavenCentral()
}

// Minecraft 1.20.1 ships LWJGL 3.3.1; a transitive dep bumps it to 3.3.2,
// which Sodium refuses to start against. Pin every LWJGL module back to 3.3.1.
// 1.20.4 ships LWJGL 3.3.3 and needs no pin (V.lwjglPin = null).
if (V.lwjglPin != null) {
    configurations.all {
        resolutionStrategy.eachDependency { details ->
            if (details.requested.group == "org.lwjgl") {
                details.useVersion V.lwjglPin
            }
        }
    }
}

dependencies {
    // Versions are chosen by the -Pmc selector at the top of this file.
    minecraft "com.mojang:minecraft:${V.minecraft}"
    mappings "net.fabricmc:yarn:${V.yarn}:v2"
    modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"

    modImplementation "net.fabricmc.fabric-api:fabric-api:${V.fabricApi}"

    modImplementation files(V.bbsJar)

    // --- Shared BBS-free engine: light SSBO + .irlights patcher (irl-core) ---
    // Per-version Loom module from mavenLocal: modClientImplementation remaps it from
    // intermediary to this mod's named mappings; `include` bundles it (JiJ). Publish it
    // with `gradlew publishToMavenLocal` in ../irl-core before building this mod.
    modClientImplementation "org.qualet:irl-core:1.1"
    include "org.qualet:irl-core:1.1"

    // Iris is referenced at compile time (sampler mixins). Sodium is runtime-only.
    modImplementation "maven.modrinth:iris:${V.iris}"
    modRuntimeOnly "maven.modrinth:sodium:${V.sodium}"

    // Iris runtime dependencies (not auto-pulled from the Modrinth artifact).
    modRuntimeOnly "org.anarres:jcpp:1.4.14"
    modRuntimeOnly "io.github.douira:glsl-transformer:2.0.0-pre13"
}

processResources {
    inputs.property "version", project.version
    inputs.property "minecraft_version", project.minecraft_version
    inputs.property "loader_version", project.loader_version
    filteringCharset "UTF-8"

    filesMatching("fabric.mod.json") {
        expand "version": project.version,
                "minecraft_version": project.minecraft_version,
                "loader_version": project.loader_version
    }

    // Embed the canonical .irlights (source of truth = patches/) so BbsPatcherHost
    // auto-extracts them on first use (matches the redactor's bundled model).
    from("patches") { into "assets/irlite/patches" }
}

def targetJavaVersion = 17
tasks.withType(JavaCompile).configureEach {
    // ensure that the encoding is set to UTF-8, no matter what the system default is
    // this fixes some edge cases with special characters not displaying correctly
    // see http://yodaconditions.net/blog/fix-for-java-file-encoding-problems-with-gradle.html
    // If Javadoc is generated, this must be specified in that task too.
    it.options.encoding = "UTF-8"
    if (targetJavaVersion >= 10 || JavaVersion.current().isJava10Compatible()) {
        it.options.release.set(targetJavaVersion)
    }
}

java {
    def javaVersion = JavaVersion.toVersion(targetJavaVersion)
    if (JavaVersion.current() < javaVersion) {
        toolchain.languageVersion = JavaLanguageVersion.of(targetJavaVersion)
    }
    // Loom will automatically attach sourcesJar to a RemapSourcesJar task and to the "build" task
    // if it is present.
    // If you remove this line, sources will not be generated.
    withSourcesJar()
}

jar {
    from("LICENSE") {
        rename { "${it}_${project.archives_base_name}" }
    }
}

// configure the maven publication
publishing {
    publications {
        create("mavenJava", MavenPublication) {
            artifactId = project.archives_base_name
            from components.java
        }
    }

    // See https://docs.gradle.org/current/userguide/publishing_maven.html for information on how to set up publishing.
    repositories {
        // Add repositories to publish to here.
        // Notice: This block does NOT have the same function as the block in the top level.
        // The repositories here will be used for publishing your artifact, not for
        // retrieving dependencies.
    }
}
